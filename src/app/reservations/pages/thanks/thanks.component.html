<app-driver-toolbar />

<div class="thanks-container">
  <div class="thanks-content animate-scale-in">
    <div class="success-circle">
      <mat-icon class="success-icon">check</mat-icon>
    </div>

    <h1 class="thanks-title">¡Gracias!</h1>
    <p class="thanks-subtitle">Su transacción fue procesada exitosamente</p>

    <div class="countdown-section">
      <p class="countdown-text">Redirigiendo en</p>
      <div class="countdown-number">{{ countdown() }}</div>
      <p class="countdown-text">segundos</p>
    </div>
  </div>
</div>
