<mat-toolbar class="app-toolbar">
  <div class="toolbar-content">
    <div class="toolbar-brand">
      <div class="toolbar-logo">
        <mat-icon>local_parking</mat-icon>
      </div>
      <span class="toolbar-title">Parking<span class="toolbar-accent">It</span></span>
    </div>

    <div class="toolbar-actions">
      <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-btn" id="user-menu-trigger">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #userMenu="matMenu">
        <div class="menu-header">
          <mat-icon>email</mat-icon>
          <span>{{ userEmail }}</span>
        </div>
        <mat-divider></mat-divider>
        <button mat-menu-item id="menu-sign-out" (click)="signOut()">
          <mat-icon>logout</mat-icon>
          <span>Cerrar sesión</span>
        </button>
      </mat-menu>
    </div>
  </div>
</mat-toolbar>
